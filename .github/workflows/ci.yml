name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality and tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            pytest-args: >-
              --ignore=tests/test_bounded_pilot_attachment_alternative_text_method.py
              --ignore=tests/test_bounded_pilot_attachment_text_method.py
              --ignore=tests/test_fixture_diagnostics_executable_authorization.py
              --ignore=tests/test_fixture_diagnostics_method_candidate.py
              --ignore=tests/test_fixture_inter_agent_diagnostics.py
          - python-version: "3.14.5"
            pytest-args: >-
              --ignore=tests/test_bounded_pilot_attachment_alternative_text_method.py
              --ignore=tests/test_bounded_pilot_attachment_text_method.py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # Governed provenance tests inspect historical pinned commits.
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.8"
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --locked --extra dev --extra analytics --extra max --extra mcp --extra rdf
      - name: Ruff lint
        run: uv run ruff check src tests scripts
      - name: Ruff format check
        run: uv run ruff format --check src tests scripts
      - name: ty fast type gate
        run: uv run ty check src tests scripts
      - name: BasedPyright baseline gate
        run: uv run basedpyright
      - name: zizmor workflow audit
        run: uv run zizmor --min-severity medium .github/workflows
      - name: Run tests in parallel
        run: uv run pytest -q -n 4 --dist worksteal ${{ matrix.pytest-args }}
      - name: Validate repository artefacts
        run: uv run foi-o-nz validate-repo
      - name: Validate release metadata
        run: uv run python scripts/check_release_metadata.py
      - name: Schema drift smoke check
        run: uv run foi-o-nz schema-drift
      - name: End-to-end smoke pipeline
        run: |
          uv run foi-o-nz smoke-fixture --output-dir data/smoke
          uv run foi-o-nz normalise-manifest --input data/smoke/fyi-manifest.jsonl --requests-output data/smoke/requests.jsonl --events-output data/smoke/events.jsonl --run-manifest-output data/smoke/run-manifest.json
          uv run foi-o-nz transition-audit data/smoke/events.jsonl --output data/smoke/transition-report.json
          uv run foi-o-nz embed-jsonl --input data/smoke/requests.jsonl --output data/smoke/request-embeddings.jsonl --kind request --dimensions 32
          uv run foi-o-nz export-rdf --requests-jsonl data/smoke/requests.jsonl --events-jsonl data/smoke/events.jsonl --output data/smoke/foi-o-nz.ttl
          uv run foi-o-nz validate-shacl data/smoke/foi-o-nz.ttl --shapes shacl/foi-o-nz.shapes.ttl
          uv run foi-o-nz chunk-jsonl --input data/smoke/requests.jsonl --output data/smoke/request-chunks.jsonl --kind request
          uv run foi-o-nz risk-scan --input data/smoke/request-chunks.jsonl --output data/smoke/risk-assessments.jsonl
          uv run foi-o-nz search-chunks --input data/smoke/request-chunks.jsonl --query "example request" --output data/smoke/retrieval-results.json --top-k 3 --dimensions 16
          uv run foi-o-nz propose-redactions --input data/smoke/request-chunks.jsonl --output data/smoke/redaction-candidates.jsonl
          uv run foi-o-nz build-agent-pack --request-id 12345 --requests-jsonl data/smoke/requests.jsonl --events-jsonl data/smoke/events.jsonl --chunks-jsonl data/smoke/request-chunks.jsonl --risks-jsonl data/smoke/risk-assessments.jsonl --retrieval-json data/smoke/retrieval-results.json --redaction-candidates-jsonl data/smoke/redaction-candidates.jsonl --output data/smoke/agent-pack.12345.json
          uv run foi-o-nz diff-jsonl --before data/smoke/events.jsonl --after data/smoke/events.jsonl --output data/smoke/events.diff.json
          uv run foi-o-nz build-ledger --input data/smoke/events.jsonl --output data/smoke/events.ledger.jsonl --record-type event
          uv run foi-o-nz verify-ledger --input data/smoke/events.jsonl --ledger data/smoke/events.ledger.jsonl --record-type event
          uv run foi-o-nz export-tool-manifest --output data/smoke/tool-manifest.json
          uv run foi-o-nz export-openapi --output data/smoke/openapi.json
          uv run foi-o-nz dataset-metadata data/smoke/requests.jsonl data/smoke/events.jsonl data/smoke/request-chunks.jsonl --output data/smoke/dataset-metadata.json --base-dir .
          uv run foi-o-nz repro-manifest data/smoke/requests.jsonl data/smoke/events.jsonl data/smoke/request-chunks.jsonl --output data/smoke/reproducibility-manifest.json --base-dir .
          uv run foi-o-nz benchmark-local --output data/smoke/benchmarks.json --iterations 100
          uv run foi-o-nz kernel-status --output data/smoke/native-kernel-status.json
          uv run foi-o-nz kernel-conformance --output data/smoke/kernel-conformance.json
          uv run foi-o-nz mojo-audit --output data/smoke/mojo-audit.json
          uv run foi-o-nz export-kernel-manifest --output data/smoke/kernel-manifest.json
          uv run foi-o-nz export-kernel-fixtures --output mojo/tests/fixtures/kernel-conformance.jsonl
          uv run foi-o-nz kernel-readiness --output data/smoke/kernel-readiness.json
          uv run foi-o-nz build-review-queue --events-jsonl data/smoke/events.jsonl --risks-jsonl data/smoke/risk-assessments.jsonl --redaction-candidates-jsonl data/smoke/redaction-candidates.jsonl --output data/smoke/review-queue.jsonl
          uv run foi-o-nz process-advice --request-id 12345 --requests-jsonl data/smoke/requests.jsonl --events-jsonl data/smoke/events.jsonl --review-queue-jsonl data/smoke/review-queue.jsonl --output data/smoke/process-advice.json
          uv run foi-o-nz export-annotation-tasks --review-queue-jsonl data/smoke/review-queue.jsonl --output data/smoke/annotation-tasks.jsonl
          uv run foi-o-nz export-graph --requests-jsonl data/smoke/requests.jsonl --events-jsonl data/smoke/events.jsonl --chunks-jsonl data/smoke/request-chunks.jsonl --risks-jsonl data/smoke/risk-assessments.jsonl --output data/smoke/process-graph.json
          uv run foi-o-nz export-table-contracts --output data/smoke/table-contracts.json
          uv run foi-o-nz materialise-oci data/smoke/requests.jsonl data/smoke/events.jsonl data/smoke/request-chunks.jsonl --output-dir data/smoke/oci --base-dir .
          uv run foi-o-nz export-mcp-bundle --output data/smoke/mcp-bundle.json
          uv run foi-o-nz attest-artifacts data/smoke/requests.jsonl data/smoke/events.jsonl --output data/smoke/attestation.json --invocation-id ci-smoke
          uv run foi-o-nz sample-goldset --input data/smoke/requests.jsonl --output data/smoke/goldset.jsonl --manifest-output data/smoke/goldset.manifest.json --kind request --limit 10

  serial-python:
    name: Serial Python regression gate
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.8"
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          # The governed diagnostics commitment is runtime-pinned to 3.14.5.
          python-version: "3.14.5"
      - name: Sync dependencies
        run: uv sync --locked --extra dev --extra analytics --extra max --extra mcp --extra rdf
      - name: Run tests serially
        run: >-
          uv run pytest -q
          --ignore=tests/test_bounded_pilot_attachment_alternative_text_method.py
          --ignore=tests/test_bounded_pilot_attachment_text_method.py

  mojo:
    name: Mojo/MAX experimental core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          cache: true
      - name: Mojo format check
        run: pixi run mojo-format-check
      - name: Mojo tests
        run: pixi run mojo-test
      - name: Mojo build
        run: pixi run mojo-build

  security:
    name: Security and supply-chain checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.8"
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
      - name: Sync dependencies
        run: uv sync --locked --extra dev --extra analytics --extra max --extra mcp --extra rdf
      - name: pip-audit
        run: uv run pip-audit
      - name: Generate SBOM
        run: |
          mkdir -p dist
          uv run cyclonedx-py environment --output-format json --output-file dist/sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: dist/sbom.cdx.json
