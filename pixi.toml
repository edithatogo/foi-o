[project]
name = "foi-o-nz"
version = "0.1.0"
description = "Mojo/MAX experimental core for FOI-O NZ"
channels = ["https://conda.modular.com/max-nightly/", "https://conda.modular.com/max/", "conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.12,<3.14"
mojo = "*"
modular = "*"
uv = ">=0.8"
ruff = ">=0.12"
pytest = ">=8.4"

[pypi-dependencies]
foi-o-nz = { path = ".", editable = true, extras = ["dev", "analytics", "max"] }

[tasks]
install = "uv sync --extra dev --extra analytics --extra max"
py-test = "uv run pytest -q"
py-quality = "uv run ruff check src tests scripts && uv run ruff format --check src tests scripts"
mojo-format = "mojo format mojo"
mojo-format-check = "mojo format --check mojo"
mojo-test = "mojo run -I mojo mojo/tests/test_state.mojo && mojo run -I mojo mojo/tests/test_clock.mojo"
mojo-build = "mkdir -p build && mojo build -I mojo mojo/cli.mojo -o build/foi-o-nz-mojo"
quality = { depends-on = ["py-quality", "py-test", "mojo-format-check", "mojo-test"] }
