    risk: empirical fixtures could be promoted as gold without independent review
    mitigation: promotion remains human-gated and is not performed in this track
  - id: R-002
    risk: deterministic rule outputs could be misread as legal findings
    mitigation: preserve candidate trace language and legal_claims_permitted false contracts
  - id: R-003
    risk: raw platform states could be overwritten by normalized mappings
    mitigation: mappings remain versioned hypotheses and raw states remain source evidence
  - id: R-004
    risk: benchmark contamination through reuse for authoring or threshold selection
    mitigation: sealed temporal benchmark and contamination policy remain mandatory follow-up gates
  - id: R-005
    risk: bundle packaging metadata is not editable-installable
    mitigation: validate without installing the staging distribution and retain the failure in audit evidence
  - id: R-006
    risk: the verified fyi-archive-nz candidate snapshot has null licence fields for all 33217 records
    mitigation: require an explicit human-approved rights rule and rights-reviewed record selection before re-extraction
  - id: R-007
    risk: synthetic placeholder-pinned nlp-policy-nz fixtures could be mistaken for a real empirical baseline
    mitigation: require a separately hashed real baseline and immutable pipeline/model revision before any comparison claim
  - id: R-008
    risk: adjacent official as-at dates could be misrepresented as legally reviewed applicability intervals
    mitigation: retain legal_applicability_approved false for every candidate until named-human commencement and amendment review
  - id: R-009
    risk: one correspondence-bearing request with an empty attachment inventory could be generalized to archive-wide state mappings
    mitigation: preserve bounded single-request scope and require separate rights-cleared nonempty attachment evidence plus named-human mapping review
  - id: R-010
    risk: a candidate annotation protocol could be mistaken for approval or completed empirical work
    mitigation: keep approval identities source population sample configuration annotations adjudication and reliability fail-closed until independently supplied
