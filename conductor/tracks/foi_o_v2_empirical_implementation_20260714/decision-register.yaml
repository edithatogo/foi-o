version: 1
decisions:
  - id: D-001
    decision: preserve_foi_o_nz_package_and_namespace
    rationale: V1 compatibility boundary
  - id: D-002
    decision: extend_existing_ids_and_runtime_surfaces
    rationale: avoid duplicate event provenance annotation goldset state mapping and rules subsystems
  - id: D-003
    decision: renumber_adrs_0006_to_0010_and_docs_33_to_40
    rationale: reconcile with live repository namespaces
  - id: D-004
    decision: keep_rule_and_mapping_outputs_candidate_only
    rationale: automated outputs cannot certify legal or administrative outcomes
  - id: D-005
    decision: keep_master_programme_governance_in_rulesandprocesses
    rationale: local track owns implementation detail only
  - id: D-006
    decision: defer_fe_reader_from_immediate_programme
    rationale: technical preview and not required for archive re-extraction
  - id: D-007
    decision: keep_alaveteli_as_source_intelligence_only
    rationale: fyi-cli owns capture from the upstream public platform
  - id: D-008
    decision: separate_immutable_archive_from_versioned_nlp_derivatives
    rationale: preserve raw evidence while enabling reproducible ontology-pinned re-extraction
  - id: D-009
    decision: treat_adjacent_as_at_intervals_as_unapproved_candidates
    rationale: deterministic ordering does not establish legal commencement or amendment applicability
  - id: D-010
    decision: keep_bounded_correspondence_audit_separate_from_archive_wide_claims
    rationale: request 35076 has one correspondence item but no attachment evidence and cannot justify generalization
  - id: D-011
    decision: require_distinct_human_annotation_roles_before_sample_freeze
    rationale: protocol approval cannot substitute for two blinded annotators and a distinct adjudicator
  - id: D-012
    decision: separate_rendered_html_attachment_supplement_from_canonical_fyi_json_capture
    rationale: request 11872 exposes three attachment links in rendered HTML while its FYI JSON attachment inventory is empty
