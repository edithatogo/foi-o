version: 1.0.0
decisions:
  - {id: AU-DEC-01, status: accepted, decision: use_exact_profiles_foio_au_cth_and_foio_au_nsw, rationale: prevent cross-jurisdiction substitution during the pilot}
  - {id: AU-DEC-02, status: accepted, decision: require_primary_law_and_official_source_authority_tiers, rationale: preserve source precedence while retaining conflicts for human review}
  - {id: AU-DEC-03, status: accepted, decision: reject_derived_summaries_as_controlling_evidence, rationale: derived output cannot independently validate itself}
  - {id: AU-DEC-04, status: accepted, decision: do_not_freeze_sample_until_all_twelve_readiness_blockers_clear, rationale: no authentic Australian empirical bundle currently satisfies the approved protocol}
  - {id: AU-DEC-05, status: accepted, decision: map_each_readiness_blocker_once_to_an_owner_issue_evidence_contract_and_human_gate, rationale: make the exact operator path auditable without inferring approval or weakening the empirical boundary}
  - {id: AU-DEC-06, status: accepted, approved_on: 2026-07-24, decision: approve_sole_developer_agent_role_protocol_design, protocol_path: docs/41-v2-sampling-and-annotation-protocol.md, protocol_sha256: 9e8415e60c90d8feba2290c5a97aa1a03f7200978fb6b212f5df54ed99b44caf, approval_statement_sha256: 1e5a1c46977409dcff1a1692b3fa7adf96a9b2db2851d2a1cc769b6cee0b8b68, rationale: protocol design only; source capture sample membership annotation execution and all empirical or publication outcomes remain unauthorized}
